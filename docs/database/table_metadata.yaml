# docs/database/table_metadata.yaml
#
# Hand-written metadata for every table in the Kidsights Data Platform DuckDB.
# This is the authoritative source for table purpose, source, and downstream
# consumer. The /refresh-database-inventory skill reads this file together
# with the live DB inventory (scripts/temp/inventory_tables.py output) to
# regenerate docs/database/TABLES.md.
#
# Schema per entry:
#   purpose:            One-line description of what the table holds.
#   source:             Which script or pipeline step writes to the table.
#   primary_downstream: Single primary consumer (pipeline step + script).
#                       Use "—" if the table is a terminal output.
#   status:             One of: live | backup | test | empty | deprecated
#   group:              Display grouping in TABLES.md — one of:
#                         ne25, ne25_imputed, mn26, nsch, nhis, acs,
#                         calibration, raking, crosswalks, metadata,
#                         historical, cleanup
#   dictionary:         (optional) Path to the full column dictionary.
#   notes:              (optional) Maintainer notes, gotchas, history.
#
# When adding a new table: append a new entry; the skill's orphan check will
# flag tables that exist in the DB but are missing from this file.

tables:

  # ==========================================================================
  # ne25_* — Nebraska 2025 REDCap survey pipeline (non-imputed)
  # ==========================================================================

  ne25_raw:
    purpose: "Raw REDCap exports from the four NE25 project PIDs, unioned and lightly cleaned."
    source: "Step 5 of run_ne25_pipeline.R (R/extract/ne25.R writes via python.db.operations)."
    primary_downstream: "Step 6 of run_ne25_pipeline.R — feeds recode_it() derivation into ne25_transformed."
    status: live
    group: ne25

  ne25_transformed:
    purpose: "Canonical NE25 analytic table — raw fields + 99 derived variables + inclusion flags + weights + scoring joins."
    source: "Step 6 onward of run_ne25_pipeline.R (recode_it() for derived vars, Step 6.7+ joins scores, Step 6.9 joins raking weights)."
    primary_downstream: "Most downstream consumers: raking (scripts/raking/ne25/*), imputation pipeline, IRT calibration prep, all reports."
    status: live
    group: ne25
    dictionary: "docs/data_dictionary/ne25_data_dictionary_full.md"

  ne25_transformed_backup_2025_11_08:
    purpose: "Pre-refactor snapshot of ne25_transformed (670 cols vs current 723)."
    source: "Manual backup taken 2025-11-08 before schema changes."
    primary_downstream: "—"
    status: backup
    group: cleanup
    notes: "Flagged for cleanup in HANDOFF.md. Schema pre-dates the weight and scoring column additions."

  ne25_raw_pid7679:
    purpose: "Per-project staging table for REDCap PID 7679 (defunct)."
    source: "Legacy per-project ingestion pattern (pre-unioned ne25_raw)."
    primary_downstream: "—"
