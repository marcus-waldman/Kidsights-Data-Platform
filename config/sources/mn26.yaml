# MN26 (Minnesota 2026) Study Configuration
# REDCap data source configuration for Kidsights Minnesota study
#
# Updated: 2026-04-04 based on reconciliation audit findings
# Audit: scripts/mn26/reconciliation_audit.R
# Mapping: config/mappings/ne25_to_mn26_field_map.csv

# REDCap connection settings
redcap:
  url: "https://unmcredcap.unmc.edu/redcap/api/"

  # API credentials file location (NOT committed to git)
  # Override via REDCAP_API_CREDENTIALS_PATH_MN26 env var in .env
  api_credentials_file: "C:/my_auths/kidsights_redcap_norc_MN_2026.csv"

  # MN26 production uses 5 REDCap projects (4 production + 1 reissue):
  #   8723, 8724, 8725, 8726 — Kidsights Survey NORC 1-4 (production)
  #   8792                   — Incomplete REDCap Responses (reissue URLs)
  # PIDs are loaded dynamically from credentials CSV
  timeout: 300  # seconds
  rate_limit:
    max_requests_per_hour: 1000
    retry_attempts: 3
    retry_delay: 5  # seconds

# Multi-child configuration
multi_child:
  max_children: 2
  child2_existence_field: "dob_c2_n"  # Non-empty = child 2 exists
  pivot_strategy: "early"  # Pivot to long immediately after extraction
  unique_id: ["pid", "record_id", "child_num"]

# MN26-specific field configuration (verified by reconciliation audit)
fields:
  # Core identifiers
  identifiers:
    - "record_id"
    - "pid"
    - "redcap_event_name"

  # Age calculation fields (RENAMED from NE25: age_in_days → age_in_days_n)
  age_fields:
    child_age: "age_in_days_n"       # @HIDDEN calc field, still in data
    child2_age: "age_in_days_c2_n"   # @HIDDEN calc field for child 2
    child_dob: "dob_n"
    child2_dob: "dob_c2_n"
    consent_date: "consent_date_n"

  # Geographic validation
  geographic:
    zip_code: "sq001"
    county: "fq001"
    state_residence: "mn_eqstate"  # RENAMED from NE25: eqstate → mn_eqstate

  # Eligibility screening
  eligibility:
    informed_consent: "eq001"
    primary_caregiver: "eq002"
    caregiver_age_19plus: "eq003"
    state_residence: "mn_eqstate"

  # Demographics (RENAMED from NE25)
  demographics:
    child_sex: "cqr009"          # IDENTICAL coding: 1=Female, 0=Male
    parent_gender: "mn2"         # RENAMED from cqr002; 0=Female, 1=Male, 97=Non-binary
    parent_age: "cqr003"
    parent_education: "cqr004"   # IDENTICAL coding: 0-8
    marital_status: "cqfa001"    # IDENTICAL coding: 0-5
    parent_hispanic: "sq003"

  # Race checkboxes (STRUCTURAL change from NE25)
  race:
    child_race_base: "cqr010b"       # NE25 had cqr010 (15 categories → 6)
    child_race_options: [100, 101, 102, 103, 104, 105]
    child_hispanic: "cqr011"
    caregiver_race_base: "sq002b"    # NE25 had sq002 (15 categories → 6)
    caregiver_race_options: [100, 101, 102, 103, 104, 105]
    caregiver_hispanic: "sq003"
    race_labels:
      100: "American Indian or Alaska Native"
      101: "Asian"
      102: "Black or African American"
      103: "Native Hawaiian or Other Pacific Islander"
      104: "White"
      105: "Other"

# Data validation rules
# NOTE: NORC analytic sample uses 2191 days (~6 years) — see analytic_sample
# block below. The 1825 value here is retained for any legacy code path that
# may still reference it; new code should read analytic_sample.age_max_days.
validation:
  child_age_max_days: 2191  # ~6 years (NORC analytic sample band)
  caregiver_min_age: 19

  # Minnesota ZIP code prefixes (complete list)
  minnesota_zip_prefixes:
    - "550"
    - "551"
    - "553"
    - "554"
    - "555"
    - "556"
    - "557"
    - "558"
    - "559"
    - "560"
    - "561"
    - "562"
    - "563"
    - "564"
    - "565"
    - "566"
    - "567"

  validate_zip_county_match: true

# NORC analytic sample definition (replaces the legacy 4-criterion rule)
# Mirrors kidsights-norc/origin/norc_shared:
#   progress-monitoring/mn26/utils/norc_summarise.R::norc_elig_screen()
# NORC pre-screens parent age (>=19), primary caregiver, and MN residency
# BEFORE routing participants to REDCap, so those criteria are not collected
# in production. Eligibility is determined entirely by the eligibility_form_norc
# instrument (kids_u6_n, mn_birth_*, parent_guardian_*, dob_*, age_in_days_*).
analytic_sample:
  # P_SUID crosswalk (NORC sampling frame) — NOT committed to git
  id_xwalk_path: "C:/Users/marcu/Downloads/gunther/id_xwalk.rds"

  # REDCap project ID used to issue fresh URLs to participants who closed
  # the survey before saving (NORC reissue project)
  reissue_pid: 8792

  # Maximum child age in days (~6.0 years; admits the full 0-5.99 yr band)
  age_max_days: 2191

  # Module labels considered "survey complete" (in NORC instrument-order)
  survey_complete_modules:
    - "Follow-up"
    - "Compensation"

  # Eligibility scenarios (informational; logic lives in norc_elig_screen)
  scenarios:
    type_1:  "1 child u6, MN-born, age <= 2191d, parent/guardian"
    type_2:  ">1 child u6, exactly 1 MN-born; youngest MN-born qualifies"
    type_3a: ">1 child u6, >1 MN-born; youngest qualifies"
    type_3b: ">1 child u6, >1 MN-born; next-youngest qualifies"

# Recoding specifications
recoding:
  race_ethnicity:
    child_race_prefix: "cqr010b_"    # Updated from NE25's cqr010_
    child_hispanic: "cqr011"
    caregiver_race_prefix: "sq002b_"  # Updated from NE25's sq002_
    caregiver_hispanic: "sq003"

  education:
    create_4_category: true
    create_6_category: true
    create_8_category: true
    maternal_education_only: true

  income:
    adjust_for_cpi: true
    calculate_fpl: true
    fpl_categories: [100, 200, 300, 400]
    # Note: cqr006 slider max changed from $500K (NE25) to $250K+ (MN26)

# Recoded slider fields (from audit: 3 RECODED fields)
recoded_fields:
  cqr006:
    description: "Family income"
    ne25_range: "$0 - $500,000"
    mn26_range: "$0 - $250,000+"
  mmi003:
    description: "Weekly childcare cost (primary arrangement)"
    ne25_range: "$0 - $4,000"
    mn26_range: "$0 - $1,000+"
  mrw002:
    description: "Weekly childcare cost (all children)"
    ne25_range: "$0 - $4,000"
    mn26_range: "$0 - $2,000+"
    note: "Also moved from Module 3 to Module 2"

# Output configuration
output:
  database_path: "data/duckdb/kidsights_local.duckdb"

  tables:
    raw_wide: "mn26_raw_wide"        # Original extraction (audit trail)
    raw_long: "mn26_raw"             # Post-pivot (1 row per child)
    eligibility: "mn26_eligibility"
    transformed: "mn26_transformed"
    data_dictionary: "mn26_data_dictionary"
    metadata: "mn26_metadata"

  prefix_convention: "mn26_"
  preserve_original_names: true
  store_data_dictionary: true
